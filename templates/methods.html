<script>
    var dataDiv = document.getElementById("data")

    function fetchData() {
        $.ajax({
            url: "/",
            method: "POST",
            data: {
                zipcode: 97201
            },
            success: function (result) {
                console.log(result)
                dataDiv.innerHTML = result.num
            }
        });
    }

    setInterval(fetchData, 3000)
</script>
